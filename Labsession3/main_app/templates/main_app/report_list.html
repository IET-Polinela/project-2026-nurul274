<h2>Daftar Laporan</h2>

<a href="/add/">Tambah Laporan</a>

<ul>
    {% for report in reports %}
        <li>
            <b>{{ report.title }}</b> - {{ report.category }}
            <br>
            {{ report.description }}
            <br>
            {{ report.location }}
            <br>
            <a href="/edit/{{ report.id }}/">Edit</a>
            <a href="/delete/{{ report.id }}/">Hapus</a>
        </li>
    {% endfor %}
</ul>
