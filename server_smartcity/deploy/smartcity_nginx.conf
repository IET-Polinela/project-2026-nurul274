# Nginx Configuration for SmartCity Backend
# Deploy to: /etc/nginx/sites-available/smartcity
# Then: ln -s /etc/nginx/sites-available/smartcity /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl restart nginx

server {
    listen 8008;
    server_name 103.151.63.86 localhost;

    client_max_body_size 50M;

    # =====================
    # Django Static Files
    # =====================
    location /static/ {
        alias /root/project-2026-nurul274/server_smartcity/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =====================
    # Django Media Files (if any)
    # =====================
    location /media/ {
        alias /root/project-2026-nurul274/server_smartcity/media/;
        expires 7d;
    }

    # =====================
    # API & Django Admin
    # =====================
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}

