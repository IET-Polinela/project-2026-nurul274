{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width:400px;">
    <h3>Login</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input name="username" class="form-control mb-2" placeholder="Username / Email">
        <input type="password" name="password" class="form-control mb-2" placeholder="Password">

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <a href="{% url 'register' %}" class="btn btn-success w-100 mt-2">Register</a>
</div>
{% endblock %}
