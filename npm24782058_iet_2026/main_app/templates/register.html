{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width:400px;">
    <h3>Register</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-success w-100">Register</button>
    </form>

    <a href="{% url 'login' %}" class="btn btn-primary w-100 mt-2">Kembali ke Login</a>
</div>
{% endblock %}
