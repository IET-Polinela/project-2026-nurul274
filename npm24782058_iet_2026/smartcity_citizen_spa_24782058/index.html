<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        #sidebar { min-height: 100vh; width: 260px; background: white; border-right: 1px solid #dee2e6; display: none; }
        .nav-link { color: #333; font-weight: 500; }
        .nav-link.active { color: #0d6efd; background: #e9ecef; }
        .spa-container { flex-grow: 1; padding: 25px; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div id="sidebar" class="p-3">
            <h5 class="fw-bold mb-4"><i class="bi bi-buildings-fill text-primary"></i> Smart City Portal</h5>
            <nav class="nav flex-column">
                <a class="nav-link" href="#dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a class="nav-link" href="#profil"><i class="bi bi-person me-2"></i> Profil</a>
                <a class="nav-link" href="#laporan"><i class="bi bi-file-earmark-text me-2"></i> Daftar Laporan</a>
                <hr>
                <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Keluar</a>
            </nav>
        </div>
        <main id="app-content" class="spa-container"></main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
