<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Laporan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .chart-container {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .chart-box {
            width: 48%;
            height: 250px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 5px 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* MODAL */
        #modal {
            position: fixed;
            top: 30%;
            left: 35%;
            width: 320px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* STATUS BADGE */
        .status {
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .REPORTED { background: #e74c3c; }
        .VERIFIED { background: #f39c12; }
        .IN_PROGRESS { background: #3498db; }
        .RESOLVED { background: #2ecc71; }

    </style>
</head>

<body>

<div class="container">

<h2>📊 Dashboard Laporan</h2>

<div class="card">
    <input type="text" id="searchInput" placeholder="🔍 Cari laporan...">
    <ul id="searchResults"></ul>
</div>

<div class="card">
    <div class="chart-container">
        <div class="chart-box">
            <canvas id="statusChart"></canvas>
        </div>
        <div class="chart-box">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
</div>

<div class="card">
    <h3>Laporan Terbaru</h3>
    <ul id="reportedList"></ul>
</div>

<div class="card">
    <h3>Laporan Selesai</h3>
    <ul id="resolvedList"></ul>
</div>

</div>

<!-- MODAL -->
<div id="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <p>Status: <span id="modalStatus"></span></p>
    <button onclick="closeModal()">Tutup</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // ======================
    // CHART
    // ======================
    fetch('/dashboard/api/stats/')
    .then(res => res.json())
    .then(data => {

        new Chart(document.getElementById('statusChart'), {
            type: 'doughnut',
            data: {
                labels: data.status.map(i => i.status),
                datasets: [{
                    data: data.status.map(i => i.total)
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: {
                labels: data.category.map(i => i.category),
                datasets: [{
                    data: data.category.map(i => i.total)
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

    });

    // ======================
    // LATEST
    // ======================
    fetch('/dashboard/api/latest/')
    .then(res => res.json())
    .then(data => {

        data.reported.forEach(item => {
            document.getElementById('reportedList').innerHTML += `
                <li>
                    ${item.title}
                    <button onclick="loadDetail(${item.id})">Detail</button>
                </li>`;
        });

        data.resolved.forEach(item => {
            document.getElementById('resolvedList').innerHTML += `
                <li>${item.title}</li>`;
        });

    });

    // ======================
    // SEARCH (DEBOUNCE)
    // ======================
    let timeout = null;

    document.getElementById('searchInput').addEventListener('keyup', function () {

        clearTimeout(timeout);

        timeout = setTimeout(() => {
            fetch(`/dashboard/api/search/?q=${this.value}`)
            .then(res => res.json())
            .then(data => {

                const list = document.getElementById('searchResults');
                list.innerHTML = '';

                data.results.forEach(item => {
                    list.innerHTML += `
                        <li>
                            ${item.title}
                            <button onclick="loadDetail(${item.id})">Detail</button>
                        </li>`;
                });

            });

        }, 300);

    });

});


// ======================
// MODAL AJAX + STATUS
// ======================
function loadDetail(id) {
    fetch(`/dashboard/api/detail/${id}/`)
    .then(res => res.json())
    .then(data => {

        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalDesc').innerText = data.description;

        const statusEl = document.getElementById('modalStatus');
        statusEl.innerText = data.status;

        statusEl.className = 'status';
        statusEl.classList.add(data.status);
    });
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    console.log("FETCH JALAN");

    fetch("/dashboard/api/stats/")
        .then(response => response.json())
        .then(data => {
            console.log("DATA DARI SERVER:", data);
        })
        .catch(error => console.error("ERROR:", error));
});
</script>

</body>
</html>
